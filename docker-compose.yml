services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maintenance_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-maintenance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maintenance}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maintenance} -d ${POSTGRES_DB:-maintenance_copilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-Industrial Maintenance Knowledge Copilot}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://maintenance:maintenance@postgres:5432/maintenance_copilot}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/data/uploads}
      PARSED_DIR: ${PARSED_DIR:-/app/data/parsed}
      RENDERED_PAGES_DIR: ${RENDERED_PAGES_DIR:-/app/data/rendered-pages}
      SECRET_KEY: ${SECRET_KEY:-replace-this-in-real-environments}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api/app:/app/app
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8000}
      WEB_PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared-types:/app/packages/shared-types
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/apps/web/.next
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  qdrant-data:
  web-node-modules:
  web-next-cache:
